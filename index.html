<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电影级太阳系模拟器 · Cinematic Solar System</title>
<style>
  :root{
    --glass-bg: rgba(12,16,28,0.55);
    --glass-border: rgba(120,160,220,0.18);
    --accent: #6fb6ff;
    --text: #dfe8ff;
    --text-dim: #8fa0c0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#03040a;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;}
  #scene{position:fixed;inset:0;display:block}
  /* CSS2D label layer */
  #labels{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5}
  .body-label{
    color:rgba(225,235,255,0.82);
    font-size:12px;letter-spacing:.5px;
    text-shadow:0 0 6px rgba(120,180,255,0.7),0 0 2px rgba(0,0,0,0.9);
    white-space:nowrap;transform:translate(-50%,-50%);
    transition:opacity .3s ease;
    user-select:none;
  }
  .body-label.selected{color:#ffe9a8;text-shadow:0 0 8px rgba(255,200,80,0.9)}
  /* Top search */
  #searchbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:20;
    width:min(420px,80vw)}
  #search-input{width:100%;padding:10px 14px;border-radius:24px;
    background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);color:var(--text);font-size:14px;outline:none;
    box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  #search-input::placeholder{color:var(--text-dim)}
  #search-results{margin-top:6px;background:var(--glass-bg);backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;
    overflow:hidden;max-height:300px;overflow-y:auto;display:none}
  .search-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05)}
  .search-item:hover{background:rgba(110,180,255,0.15)}
  .search-item .en{color:var(--text-dim);margin-left:8px;font-size:11px}
  /* Left info panel */
  #info-panel{position:fixed;top:64px;left:14px;z-index:15;width:280px;max-height:calc(100vh - 90px);
    overflow-y:auto;background:var(--glass-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);border-radius:16px;padding:16px 18px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5)}
  #info-panel h2{font-size:18px;font-weight:600;color:#fff;margin-bottom:2px}
  #info-panel .en-name{font-size:12px;color:var(--text-dim);margin-bottom:10px}
  #info-panel .type-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;
    background:rgba(110,180,255,0.18);color:var(--accent);margin-bottom:12px}
  #info-panel .row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;
    border-bottom:1px dashed rgba(255,255,255,0.06)}
  #info-panel .row .k{color:var(--text-dim)}
  #info-panel .row .v{color:var(--text);font-variant-numeric:tabular-nums;text-align:right}
  #info-panel .hint{color:var(--text-dim);font-size:12px;line-height:1.6}
  /* Right control panel */
  #control-panel{position:fixed;top:64px;right:14px;z-index:15;width:230px;
    background:var(--glass-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-border);border-radius:16px;padding:14px 16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5)}
  #control-panel h3{font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .ctrl-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0;font-size:12.5px}
  .ctrl-row label{cursor:pointer}
  .toggle{position:relative;width:34px;height:18px;background:rgba(255,255,255,0.12);border-radius:9px;cursor:pointer;transition:.2s}
  .toggle.on{background:var(--accent)}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on::after{left:18px}
  input[type=range]{width:100%;accent-color:var(--accent);height:4px}
  .slider-row{margin:10px 0}
  .slider-row .top{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-dim);margin-bottom:4px}
  .slider-row .val{color:var(--accent)}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
  .btn{padding:7px 6px;font-size:11px;border:1px solid var(--glass-border);border-radius:8px;
    background:rgba(255,255,255,0.05);color:var(--text);cursor:pointer;transition:.15s;text-align:center}
  .btn:hover{background:rgba(110,180,255,0.2);border-color:var(--accent)}
  .btn.full{grid-column:1/-1}
  .seg{display:flex;border:1px solid var(--glass-border);border-radius:8px;overflow:hidden}
  .seg button{flex:1;padding:6px;font-size:11px;background:transparent;color:var(--text-dim);border:none;cursor:pointer}
  .seg button.active{background:var(--accent);color:#06122a}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#03040a;z-index:100;flex-direction:column;gap:14px}
  #loading .spinner{width:38px;height:38px;border:3px solid rgba(110,180,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading .txt{color:var(--text-dim);font-size:13px}
  #fps{position:fixed;bottom:8px;left:10px;font-size:10px;color:rgba(140,160,200,0.5);z-index:10;font-variant-numeric:tabular-nums}
  #lang-toggle{position:fixed;top:14px;right:14px;z-index:20;width:54px;height:38px;border-radius:10px;
    background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);color:var(--text);font-size:12px;cursor:pointer;font-weight:600}
  #github-link{position:fixed;top:14px;right:78px;z-index:20;width:38px;height:38px;border-radius:10px;
    background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .18s ease,background .18s ease,border-color .18s ease}
  #github-link:hover{transform:translateY(-1px);border-color:rgba(255,255,255,0.4)}
  #github-link svg{width:20px;height:20px;fill:var(--text)}
  #date-display{position:fixed;bottom:8px;right:14px;font-size:13px;color:rgba(180,200,240,0.75);z-index:10;font-variant-numeric:tabular-nums;letter-spacing:1px;text-shadow:0 0 6px rgba(0,0,0,0.8)}
  /* 移动端响应式 */
  #panel-toggle{display:none;position:fixed;bottom:14px;right:14px;z-index:18;width:44px;height:44px;border-radius:50%;
    background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);color:var(--text);font-size:20px;cursor:pointer;align-items:center;justify-content:center}
  @media (max-width:680px){
    #info-panel{left:8px;right:8px;width:auto;max-height:38vh;top:60px}
    #control-panel{top:auto;bottom:70px;right:8px;left:8px;width:auto;max-height:50vh;overflow-y:auto;display:none}
    #control-panel.open{display:block}
    #panel-toggle{display:flex}
    #searchbar{width:calc(100vw - 20px);top:8px}
    #github-link{right:8px;top:54px}
    #lang-toggle{right:54px;top:54px}
    #date-display{font-size:11px}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="labels"></div>

  <div id="searchbar">
    <input id="search-input" type="text" autocomplete="off"/>
    <div id="search-results"></div>
  </div>

  <a id="github-link" href="https://github.com/kael-odin/solar-system-simulator" target="_blank" rel="noopener" aria-label="GitHub 仓库" title="GitHub 仓库">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.78 2.73 1.27 3.4.97.11-.75.41-1.27.74-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.05 11.05 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.69 5.41-5.25 5.69.42.36.79 1.08.79 2.18 0 1.58-.01 2.85-.01 3.24 0 .31.21.68.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/></svg>
  </a>
  <button id="lang-toggle">中/EN</button>

  <aside id="info-panel">
    <h2 id="info-name">太阳系</h2>
    <div class="en-name" id="info-en">Solar System</div>
    <span class="type-tag" id="info-type">系统</span>
    <div id="info-body"></div>
  </aside>

  <aside id="control-panel">
    <h3 data-i18n="show">显示</h3>
    <div class="ctrl-row"><label data-i18n="asteroids">小行星带</label><div class="toggle on" data-toggle="asteroids"></div></div>
    <div class="ctrl-row"><label data-i18n="kuiper">柯伊伯带</label><div class="toggle on" data-toggle="kuiper"></div></div>
    <div class="ctrl-row"><label data-i18n="orbits">轨道线</label><div class="toggle on" data-toggle="orbits"></div></div>
    <div class="ctrl-row"><label data-i18n="labels">天体标签</label><div class="toggle on" data-toggle="labels"></div></div>
    <div class="ctrl-row"><label data-i18n="atmospheres">大气外壳</label><div class="toggle on" data-toggle="atmospheres"></div></div>

    <h3 style="margin-top:12px" data-i18n="time">时间</h3>
    <div class="slider-row">
      <div class="top"><span data-i18n="timeRate">时间倍率</span><span class="val" id="time-val">1.0×</span></div>
      <input type="range" id="time-slider" min="0" max="1000" value="10" step="1"/>
    </div>
    <div class="ctrl-row"><label data-i18n="direction">公转方向</label>
      <div class="seg" id="dir-seg"><button class="active" data-dir="1" data-i18n="prograde">顺行</button><button data-dir="-1" data-i18n="retrograde">逆行</button></div>
    </div>

    <h3 style="margin-top:12px" data-i18n="visual">画面</h3>
    <div class="slider-row">
      <div class="top"><span data-i18n="brightness">亮度</span><span class="val" id="bright-val">1.0</span></div>
      <input type="range" id="bright-slider" min="0.2" max="2.5" value="1.0" step="0.05"/>
    </div>
    <div class="slider-row">
      <div class="top"><span data-i18n="starDensity">星空密度</span><span class="val" id="star-val">100%</span></div>
      <input type="range" id="star-slider" min="0" max="100" value="100" step="1"/>
    </div>

    <h3 style="margin-top:12px" data-i18n="view">视角</h3>
    <div class="btn-row">
      <button class="btn" data-preset="overview" data-i18n="overview">太阳系全景</button>
      <button class="btn" data-preset="inner" data-i18n="inner">内太阳系</button>
      <button class="btn" data-preset="jupiter" data-i18n="jupiterSys">木星系统</button>
      <button class="btn" data-preset="saturn" data-i18n="saturnSys">土星系统</button>
      <button class="btn full" data-preset="pluto" data-i18n="plutoClose">冥王星特写</button>
      <button class="btn full" id="reset-view" data-i18n="reset">重置视角</button>
    </div>

    <h3 style="margin-top:12px" data-i18n="quality">质量</h3>
    <div class="seg" id="quality-seg">
      <button data-quality="performance" data-i18n="perf">性能</button>
      <button data-quality="balanced" data-i18n="balanced">平衡</button>
      <button data-quality="quality" data-i18n="qualityHi">质量</button>
    </div>
    <div class="ctrl-row" style="margin-top:10px"><label data-i18n="realScale">真实尺度(对数)</label><div class="toggle" data-toggle-real="1"></div></div>
  </aside>

  <div id="fps">FPS: --</div>
  <div id="date-display">2026-07-20</div>
  <button id="panel-toggle">⚙</button>

  <div id="loading">
    <div class="spinner"></div>
    <div class="txt">正在生成太阳系…</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
